<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЛИНИЯ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* База всегда черная, чтобы Safari не «моргал» белым в PWA */
        html, body { 
            width: 100%; height: 100%; 
            overflow: hidden; position: fixed;
            background-color: #000; 
        }

        #bg-wrapper {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1; display: flex; justify-content: center;
        }

        /* Слой белого фона для страниц с цитатами */
        #white-bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #FAFAF8;
            z-index: 1; opacity: 0; transition: opacity 0.8s ease-in-out;
        }
        body:not(.dark-bg) #white-bg-layer { opacity: 1; }

        /* Слои для плавного перетекания картинок */
        .img-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; object-position: center top;
            transition: opacity 0.9s ease-in-out;
        }

        /* Мягкий градиент только для заставок */
        #gradient-overlay {
            position: absolute; left: 0; bottom: 0; width: 100%; height: 28%;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.85) 65%, #000 100%);
            z-index: 10; opacity: 0; transition: opacity 0.8s ease-in-out;
            pointer-events: none;
        }
        body.dark-bg #gradient-overlay { opacity: 1; }

        /* Интерфейс */
        #menu-btn {
            position: fixed; top: env(safe-area-inset-top, 44px); right: 25px;
            z-index: 1000; width: 26px; height: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; opacity: 0; transition: opacity 0.5s ease;
        }
        .burger-line { width: 100%; height: 1.5px; background: #fff; border-radius: 1px; }

        #click-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 50; }
        .nav-zone { width: 50%; height: 100%; }

        /* Меню месяцев */
        #month-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.97); z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .month-item { padding: 12px; font-size: 20px; color: #fff; cursor: pointer; width: 100%; text-align: center; }
        .close-menu { position: absolute; top: env(safe-area-inset-top, 20px); right: 25px; font-size: 40px; color: #fff; }
    </style>
</head>
<body>

    <div id="bg-wrapper">
        <div id="white-bg-layer"></div>
        <div id="gradient-overlay"></div>
        <img id="img-active" class="img-layer" src="" style="opacity: 1; z-index: 5;">
        <img id="img-next" class="img-layer" src="" style="opacity: 0; z-index: 4;">
    </div>

    <div id="click-container">
        <div class="nav-zone" onclick="changePage(-1)"></div>
        <div class="nav-zone" onclick="changePage(1)"></div>
    </div>

    <div id="menu-btn" onclick="toggleMenu(true)">
        <div class="burger-line"></div>
        <div class="burger-line"></div>
        <div class="burger-line"></div>
    </div>

    <div id="month-menu">
        <div class="close-menu" onclick="toggleMenu(false)">×</div>
        <div class="month-item" onclick="goToMonth(1)">Январь</div>
        <div class="month-item" onclick="goToMonth(2)">Февраль</div>
        <div class="month-item" onclick="goToMonth(3)">Март</div>
        <div class="month-item" onclick="goToMonth(4)">Апрель</div>
        <div class="month-item" onclick="goToMonth(5)">Май</div>
        <div class="month-item" onclick="goToMonth(6)">Июнь</div>
        <div class="month-item" onclick="goToMonth(7)">Июль</div>
        <div class="month-item" onclick="goToMonth(8)">Август</div>
        <div class="month-item" onclick="goToMonth(9)">Сентябрь</div>
        <div class="month-item" onclick="goToMonth(10)">Октябрь</div>
        <div class="month-item" onclick="goToMonth(11)">Ноябрь</div>
        <div class="month-item" onclick="goToMonth(12)">Декабрь</div>
    </div>

    <script>
        let currentPage;
        const totalFiles = 378;
        const OFFSET = 4;
        const splashPages = [1, 2, 34, 63, 95, 126, 158, 189, 221, 253, 284, 316, 347];
        
        const imgActive = document.getElementById('img-active');
        const imgNext = document.getElementById('img-next');
        let isTransitioning = false;

        function formatNumber(num) { return num.toString().padStart(3, '0'); }

        function updateImage(isFirstLoad = false) {
            if (isTransitioning && !isFirstLoad) return;
            isTransitioning = true;

            const fileName = formatNumber(currentPage);
            const imgPath = `pages/${fileName}.JPG`;
            const isDark = splashPages.includes(currentPage);

            imgNext.src = imgPath;
            imgNext.onerror = () => { imgNext.src = `pages/${fileName}.jpg`; };

            imgNext.onload = () => {
                if (isFirstLoad) {
                    imgActive.src = imgNext.src;
                    document.body.className = isDark ? 'dark-bg' : '';
                    isTransitioning = false;
                    return;
                }

                // Запускаем анимацию растворения
                imgNext.style.opacity = '1';
                imgNext.style.zIndex = '6';
                imgActive.style.opacity = '0';
                
                // Меняем класс темы синхронно с анимацией
                document.body.className = isDark ? 'dark-bg' : '';

                setTimeout(() => {
                    imgActive.src = imgNext.src;
                    imgActive.style.opacity = '1';
                    imgNext.style.opacity = '0';
                    imgNext.style.zIndex = '4';
                    isTransitioning = false;
                }, 950);
            };

            localStorage.setItem('lastLinePage', currentPage);
            localStorage.setItem('lastUpdateDate', new Date().getDate());
        }

        function changePage(step) {
            if (isTransitioning) return;
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            updateImage();
        }

        function runSplash() {
            currentPage = 1;
            updateImage(true);
            setTimeout(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), 0, 0);
                const targetPage = Math.floor((now - start) / 86400000) + OFFSET;
                const savedPage = localStorage.getItem('lastLinePage');
                const savedDate = localStorage.getItem('lastUpdateDate');
                
                if (savedDate != now.getDate()) { currentPage = targetPage; } 
                else { currentPage = (savedPage && savedPage != 1) ? parseInt(savedPage) : targetPage; }
                
                updateImage();
                document.getElementById('menu-btn').style.opacity = 1;
            }, 2200);
        }

        function toggleMenu(show) { 
            document.getElementById('month-menu').style.display = show ? 'flex' : 'none'; 
        }
        
        function goToMonth(m) { 
            const monthPages = {1:2, 2:34, 3:63, 4:95, 5:126, 6:158, 7:189, 8:221, 9:253, 10:284, 11:316, 12:347};
            currentPage = monthPages[m]; 
            updateImage(); 
            toggleMenu(false); 
        }

        runSplash();
    </script>
</body>
</html>

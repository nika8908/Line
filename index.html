<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЛИНИЯ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1a1a1a; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        #calendar-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            background: #1a1a1a;
        }
        /* Стили для плавного наложения картинок */
        .page-img { 
            position: absolute;
            max-width: 100%; max-height: 100%; 
            object-fit: contain; 
            transition: opacity 0.4s ease-in-out; /* Плавность перехода */
            opacity: 0;
        }
        .active { opacity: 1; z-index: 2; }
        
        .nav-zone { 
            position: absolute; top: 0; width: 45%; height: 100%; 
            z-index: 100; cursor: pointer; 
            -webkit-tap-highlight-color: transparent; 
        }
        .prev { left: 0; }
        .next { right: 0; }
    </style>
</head>
<body>
    <div id="calendar-container">
        <div class="nav-zone prev" onclick="changePage(-1)"></div>
        <img id="img1" class="page-img active" src="" alt="">
        <img id="img2" class="page-img" src="" alt="">
        <div class="nav-zone next" onclick="changePage(1)"></div>
    </div>

    <script>
        let currentPage;
        const totalFiles = 378;
        const OFFSET = 4;
        let activeLayer = 1;

        function formatNumber(num) {
            return num.toString().padStart(3, '0');
        }

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        function preload(p) {
            if (p < 1) p = totalFiles;
            if (p > totalFiles) p = 1;
            const img = new Image();
            img.src = `pages/${formatNumber(p)}.JPG`;
        }

        function updateImage(isFirstLoad = false) {
            const nextLayer = activeLayer === 1 ? 2 : 1;
            const currentImg = document.getElementById('img' + activeLayer);
            const nextImg = document.getElementById('img' + nextLayer);
            const fileName = formatNumber(currentPage);
            const newSrc = `pages/${fileName}.JPG`;

            if (isFirstLoad) {
                currentImg.src = newSrc;
                currentImg.style.opacity = 1;
                preload(currentPage + 1);
                preload(currentPage - 1);
            } else {
                nextImg.src = newSrc;
                nextImg.onload = function() {
                    nextImg.classList.add('active');
                    currentImg.classList.remove('active');
                    activeLayer = nextLayer;
                    preload(currentPage + 1);
                    preload(currentPage - 1);
                };
            }
            
            localStorage.setItem('lastLinePage', currentPage);
            localStorage.setItem('lastUpdateDate', new Date().getDate());
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            updateImage();
        }

        const savedDate = localStorage.getItem('lastUpdateDate');
        const todayDate = new Date().getDate();

        if (savedDate != todayDate) {
            currentPage = getDayOfYear() + OFFSET;
        } else {
            const savedPage = localStorage.getItem('lastLinePage');
            currentPage = savedPage ? parseInt(savedPage) : (getDayOfYear() + OFFSET);
        }
        
        updateImage(true);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЛИНИЯ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1a1a1a; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        #calendar-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
        }
        img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; display: block;
            transition: opacity 0.3s ease;
            opacity: 0; /* Проявится только когда загрузится */
        }
        .nav-zone { 
            position: absolute; top: 0; width: 48%; height: 100%; 
            z-index: 100; cursor: pointer; 
            -webkit-tap-highlight-color: transparent; 
        }
        .prev { left: 0; }
        .next { right: 0; }
    </style>
</head>
<body>
    <div id="calendar-container">
        <div class="nav-zone prev" onclick="changePage(-1)"></div>
        <img id="main-img" src="" alt="">
        <div class="nav-zone next" onclick="changePage(1)"></div>
    </div>

    <script>
        let currentPage;
        const totalFiles = 378;
        const OFFSET = 4;
        const imgElement = document.getElementById('main-img');

        function formatNumber(num) {
            return num.toString().padStart(3, '0');
        }

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        // Предзагрузка в кэш браузера
        function preload(p) {
            let target = p;
            if (target < 1) target = totalFiles;
            if (target > totalFiles) target = 1;
            const tempImg = new Image();
            tempImg.src = `pages/${formatNumber(target)}.JPG`;
        }

        function updateImage() {
            const fileName = formatNumber(currentPage);
            
            // Сначала скрываем старую, чтобы не было "скачка"
            imgElement.style.opacity = 0;

            // Устанавливаем новый путь
            const newSrc = `pages/${fileName}.JPG`;
            imgElement.src = newSrc;

            imgElement.onload = function() {
                imgElement.style.opacity = 1;
                // Когда текущая готова, тихо качаем соседей
                preload(currentPage + 1);
                preload(currentPage - 1);
            };

            imgElement.onerror = function() {
                // Запасной вариант для маленьких букв .jpg
                if (!this.src.includes('.jpg')) {
                    this.src = `pages/${fileName}.jpg`;
                }
            };

            localStorage.setItem('lastLinePage', currentPage);
            localStorage.setItem('lastUpdateDate', new Date().getDate());
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            updateImage();
        }

        // Логика старта
        const savedDate = localStorage.getItem('lastUpdateDate');
        const todayDate = new Date().getDate();

        if (savedDate != todayDate) {
            currentPage = getDayOfYear() + OFFSET;
        } else {
            const savedPage = localStorage.getItem('lastLinePage');
            currentPage = savedPage ? parseInt(savedPage) : (getDayOfYear() + OFFSET);
        }

        updateImage();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛИНИЯ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Основные стили, чтобы всё было по центру и на весь экран */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1a1a1a; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }
        #calendar-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
        }
        img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; display: block;
            transition: opacity 0.2s ease-in; /* Плавное проявление */
        }
        /* Зоны для клика (лево/право) */
        .nav-zone { 
            position: absolute; top: 0; width: 45%; height: 100%; 
            z-index: 10; cursor: pointer; 
            -webkit-tap-highlight-color: transparent; 
        }
        .prev { left: 0; }
        .next { right: 0; }
    </style>
</head>
<body>
    <div id="calendar-container">
        <div class="nav-zone prev" onclick="changePage(-1)"></div>
        <img id="display-image" src="" alt="Загрузка...">
        <div class="nav-zone next" onclick="changePage(1)"></div>
    </div>

    <script>
        let currentPage;
        const totalFiles = 378;
        const OFFSET = 4; // Твой проверенный офсет для 22 марта

        function formatNumber(num) {
            return num.toString().padStart(3, '0');
        }

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        // Предзагрузка следующей и предыдущей картинки в кэш
        function preloadNeighbors(page) {
            [page - 1, page + 1].forEach(p => {
                let targetPage = p;
                if (targetPage < 1) targetPage = totalFiles;
                if (targetPage > totalFiles) targetPage = 1;
                
                const img = new Image();
                img.src = `pages/${formatNumber(targetPage)}.JPG`;
            });
        }

        function updateImage() {
            const imgElement = document.getElementById('display-image');
            const fileName = formatNumber(currentPage);
            
            imgElement.style.opacity = 0.7; // Легкое приглушение при смене
            imgElement.src = `pages/${fileName}.JPG`;

            imgElement.onload = function() {
                imgElement.style.opacity = 1;
                preloadNeighbors(currentPage); // Качаем соседей после загрузки текущей
            };

            imgElement.onerror = function() {
                // Если нет .JPG, пробуем .jpg
                if (!this.src.includes('.jpg')) {
                    this.src = `pages/${fileName}.jpg`;
                } else {
                    this.alt = "Файл " + fileName + " не найден";
                }
            };
            
            localStorage.setItem('lastLinePage', currentPage);
            localStorage.setItem('lastUpdateDate', new Date().getDate());
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            updateImage();
        }

        // Логика автоматического открытия нужного дня
        const savedDate = localStorage.getItem('lastUpdateDate');
        const todayDate = new Date().getDate();

        if (savedDate != todayDate) {
            currentPage = getDayOfYear() + OFFSET;
        } else {
            const savedPage = localStorage.getItem('lastLinePage');
            currentPage = savedPage ? parseInt(savedPage) : (getDayOfYear() + OFFSET);
        }
        
        updateImage();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЛИНИЯ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body { 
            width: 100%; height: 100%; 
            overflow: hidden; position: fixed;
            background-color: #FAFAF8; /* Всегда светлый фон для стабильности */
        }

        #bg-wrapper {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1; display: flex; justify-content: center;
            background-color: #000; /* Черная подложка только под оберткой */
        }

        #main-img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
            transition: opacity 0.4s ease-in-out; /* Быстрый и чистый переход */
        }

        /* Стиль для заставок: короткая мягкая маска внизу */
        .is-splash {
            -webkit-mask-image: linear-gradient(to bottom, black 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 88%, transparent 100%);
        }

        #menu-btn {
            position: fixed; top: env(safe-area-inset-top, 44px); right: 25px;
            z-index: 1000; width: 26px; height: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer; opacity: 0; transition: opacity 0.5s ease;
        }
        .burger-line { width: 100%; height: 1.5px; background: #fff; border-radius: 1px; }

        #month-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        /* Фикс белой полосы в меню */
        #month-menu::after {
            content: ""; position: absolute; bottom: -20vh; left: 0; width: 100%; height: 25vh; background: #000;
        }
        
        .month-item { padding: 12px; font-size: 20px; color: #fff; cursor: pointer; width: 100%; text-align: center; }
        .close-menu { position: absolute; top: env(safe-area-inset-top, 20px); right: 25px; font-size: 40px; color: #fff; }

        #click-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 50; }
        .nav-zone { width: 50%; height: 100%; }
    </style>
</head>
<body>

    <div id="bg-wrapper">
        <img id="main-img" src="" alt="">
    </div>

    <div id="click-container">
        <div class="nav-zone" onclick="changePage(-1)"></div>
        <div class="nav-zone" onclick="changePage(1)"></div>
    </div>

    <div id="menu-btn" onclick="toggleMenu(true)">
        <div class="burger-line"></div>
        <div class="burger-line"></div>
        <div class="burger-line"></div>
    </div>

    <div id="month-menu">
        <div class="close-menu" onclick="toggleMenu(false)">×</div>
        <div class="month-item" onclick="goToMonth(1)">Январь</div>
        <div class="month-item" onclick="goToMonth(2)">Февраль</div>
        <div class="month-item" onclick="goToMonth(3)">Март</div>
        <div class="month-item" onclick="goToMonth(4)">Апрель</div>
        <div class="month-item" onclick="goToMonth(5)">Май</div>
        <div class="month-item" onclick="goToMonth(6)">Июнь</div>
        <div class="month-item" onclick="goToMonth(7)">Июль</div>
        <div class="month-item" onclick="goToMonth(8)">Август</div>
        <div class="month-item" onclick="goToMonth(9)">Сентябрь</div>
        <div class="month-item" onclick="goToMonth(10)">Октябрь</div>
        <div class="month-item" onclick="goToMonth(11)">Ноябрь</div>
        <div class="month-item" onclick="goToMonth(12)">Декабрь</div>
    </div>

    <script>
        let currentPage;
        const totalFiles = 378;
        const OFFSET = 4;
        const splashPages = [1, 2, 34, 63, 95, 126, 158, 189, 221, 253, 284, 316, 347];
        const mainImg = document.getElementById('main-img');

        function formatNumber(num) { return num.toString().padStart(3, '0'); }

        function updateImage() {
            const fileName = formatNumber(currentPage);
            const imgPath = `pages/${fileName}.JPG`;
            
            // 1. Сначала плавно скрываем текущую картинку
            mainImg.style.opacity = '0.9'; 

            const tempImg = new Image();
            tempImg.src = imgPath;
            tempImg.onload = () => {
                // 2. Когда новая загружена, меняем маску (градиент)
                if (splashPages.includes(currentPage)) {
                    mainImg.classList.add('is-splash');
                    document.getElementById('bg-wrapper').style.backgroundColor = '#000';
                } else {
                    mainImg.classList.remove('is-splash');
                    document.getElementById('bg-wrapper').style.backgroundColor = '#FAFAF8';
                }
                
                // 3. Подменяем источник и возвращаем видимость
                mainImg.src = imgPath;
                mainImg.style.opacity = '1';
            };
            tempImg.onerror = () => {
                mainImg.src = `pages/${fileName}.jpg`;
                mainImg.style.opacity = '1';
            };

            localStorage.setItem('lastLinePage', currentPage);
            localStorage.setItem('lastUpdateDate', new Date().getDate());
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            updateImage();
        }

        function runSplash() {
            currentPage = 1;
            updateImage();
            setTimeout(() => {
                const now = new Date();
                const start = new Date(now.getFullYear(), 0, 0);
                const targetPage = Math.floor((now - start) / 86400000) + OFFSET;
                const savedPage = localStorage.getItem('lastLinePage');
                const savedDate = localStorage.getItem('lastUpdateDate');
                
                if (savedDate != now.getDate()) { currentPage = targetPage; } 
                else { currentPage = (savedPage && savedPage != 1) ? parseInt(savedPage) : targetPage; }
                
                updateImage();
                document.getElementById('menu-btn').style.opacity = 1;
            }, 2200);
        }

        function toggleMenu(show) { 
            document.getElementById('month-menu').style.display = show ? 'flex' : 'none'; 
        }
        
        function goToMonth(m) { 
            const monthPages = {1:2, 2:34, 3:63, 4:95, 5:126, 6:158, 7:189, 8:221, 9:253, 10:284, 11:316, 12:347};
            currentPage = monthPages[m]; 
            updateImage(); 
            toggleMenu(false); 
        }

        runSplash();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЛИНИЯ</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ЛИНИЯ">
    <link rel="apple-touch-icon" href="icon-512.png">

    <style>
        /* Сброс всех отступов */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Главный секрет: картинка управляется через body */
        html, body { 
            width: 100%; 
            height: 100%;
            height: -webkit-fill-available; /* Хак для заполнения всего экрана в iOS */
            background-color: #FAFAF8; /* Цвет для светлых страниц */
            
            /* Настройки отображения фона */
            background-position: center bottom; /* Прижимаем к низу, чтобы перекрыть полосу */
            background-size: cover;
            background-repeat: no-repeat;
            
            /* Плавная смена страниц */
            transition: background-image 0.4s ease-in-out;
            
            overflow: hidden;
            position: fixed;
            left: 0;
            top: 0;
        }

        /* Контейнер для кликов (невидимый слой поверх фона) */
        #click-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 10;
        }
        
        .nav-zone {
            width: 50%;
            height: 100%;
            cursor: pointer;
        }

        /* Кнопка меню (бургер) */
        #menu-btn {
            position: fixed; 
            top: env(safe-area-inset-top, 30px); 
            right: 25px; 
            z-index: 1000;
            width: 26px; 
            height: 18px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between;
            cursor: pointer;
            filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.5));
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        .burger-line {
            width: 100%; 
            height: 1.5px; 
            background: #fff; 
            border-radius: 1px;
        }

        /* Меню выбора месяца */
        #month-menu {
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96); 
            z-index: 2000;
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        
        .month-item { 
            padding: 15px; 
            font-size: 22px; 
            color: #fff; 
            cursor: pointer; 
            width: 100%; 
            text-align: center;
            font-weight: 300;
        }
        
        .close-menu { 
            position: absolute; 
            top: env(safe-area-inset-top, 20px); 
            right: 25px; 
            font-size: 40px; 
            color: #fff; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="menu-btn" onclick="toggleMenu(true)">
        <div class="burger-line"></div>
        <div class="burger-line"></div>
        <div class="burger-line"></div>
    </div>

    <div id="month-menu">
        <div class="close-menu" onclick="toggleMenu(false)">×</div>
        <div class="month-item" onclick="goToMonth(1)">Январь</div>
        <div class="month-item" onclick="goToMonth(2)">Февраль</div>
        <div class="month-item" onclick="goToMonth(3)">Март</div>
        <div class="month-item" onclick="goToMonth(4)">Апрель</div>
        <div class="month-item" onclick="goToMonth(5)">Май</div>
        <div class="month-item" onclick="goToMonth(6)">Июнь</div>
        <div class="month-item" onclick="goToMonth(7)">Июль</div>
        <div class="month-item" onclick="goToMonth(8)">Август</div>
        <div class="month-item" onclick="goToMonth(9)">Сентябрь</div>
        <div class="month-item" onclick="goToMonth(10)">Октябрь</div>
        <div class="month-item" onclick="goToMonth(11)">Ноябрь</div>
        <div class="month-item" onclick="goToMonth(12)">Декабрь</div>
    </div>

    <div id="click-container">
        <div class="nav-zone" onclick="changePage(-1)"></div>
        <div class="nav-zone" onclick="changePage(1)"></div>
    </div>

    <script>
        let currentPage;
        const totalFiles = 378;
        const OFFSET = 4;
        const menuBtn = document.getElementById('menu-btn');
        
        const monthPages = {
            1: 2, 2: 34, 3: 63, 4: 95, 5: 126, 6: 158, 
            7: 189, 8: 221, 9: 253, 10: 284, 11: 316, 12: 347
        };

        function formatNumber(num) { return num.toString().padStart(3, '0'); }

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            return Math.floor((now - start) / (1000 * 60 * 60 * 24));
        }

        function toggleMenu(show) {
            document.getElementById('month-menu').style.display = show ? 'flex' : 'none';
        }

        function goToMonth(monthIndex) {
            currentPage = monthPages[monthIndex];
            updateImage();
            toggleMenu(false);
        }

        // Новая функция обновления через фоновое изображение
        function updateImage() {
            const fileName = formatNumber(currentPage);
            const imgPath = `pages/${fileName}.JPG`;
            
            // Предзагрузка в памяти, чтобы избежать мерцания
            const tempImg = new Image();
            tempImg.src = imgPath;
            
            tempImg.onload = () => {
                document.body.style.backgroundImage = `url('${imgPath}')`;
            };
            
            // Проверка на маленькие буквы .jpg, если .JPG не сработал
            tempImg.onerror = () => {
                const altPath = `pages/${fileName}.jpg`;
                document.body.style.backgroundImage = `url('${altPath}')`;
            };
            
            localStorage.setItem('lastLinePage', currentPage);
            localStorage.setItem('lastUpdateDate', new Date().getDate());
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            updateImage();
        }

        function runSplash() {
            const savedDate = localStorage.getItem('lastUpdateDate');
            const todayDate = new Date().getDate();
            const targetPage = getDayOfYear() + OFFSET;
            const savedPage = localStorage.getItem('lastLinePage');

            // Показываем обложку
            currentPage = 1;
            updateImage();

            // Через 2.2 секунды переходим на нужную страницу
            setTimeout(() => {
                if (savedDate != todayDate) {
                    currentPage = targetPage;
                } else {
                    currentPage = (savedPage && savedPage != 1) ? parseInt(savedPage) : targetPage;
                }
                updateImage();
                menuBtn.style.opacity = 1;
            }, 2200);
        }

        runSplash();
    </script>
</body>
</html>

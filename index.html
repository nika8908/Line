<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЛИНИЯ</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-512.png">
    
    <meta id="theme-meta" name="theme-color" content="#000000">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            height: 100dvh; 
            background: #000; 
            overflow: hidden; 
            position: fixed; 
            font-family: -apple-system, sans-serif;
            transition: background 0.3s ease;
        }

        #main-container {
            position: relative; 
            width: 100vw; 
            height: 100dvh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        #main-img {
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
            /* Ускорили переход: было 0.8s стало 0.4s */
            transition: opacity 0.4s ease-in-out; 
            opacity: 0;
            z-index: 10;
        }

        #grad-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 18dvh; 
            pointer-events: none;
            z-index: 20;
            transition: background 0.3s ease;
        }

        .nav-zone { 
            position: absolute; top: 0; width: 45%; height: 100%; 
            z-index: 100; -webkit-tap-highlight-color: transparent; 
        }
        .prev { left: 0; }
        .next { right: 0; }

        #menu-btn {
            position: fixed; 
            top: env(safe-area-inset-top, 25px); 
            right: 20px; 
            z-index: 1000; 
            width: 26px; height: 18px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            opacity: 0; transition: opacity 0.6s ease;
        }
        .burger-line { width: 100%; height: 1.2px; background: rgba(0,0,0,0.4); border-radius: 0.5px; }

        #month-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(250, 250, 248, 0.98); z-index: 2000; 
            display: none; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .month-item { padding: 15px; font-size: 20px; color: #333; width: 100%; text-align: center; font-weight: 300; }
    </style>
</head>
<body>

    <div id="main-container">
        <div class="nav-zone prev" onclick="changePage(-1)"></div>
        <img id="main-img" src="">
        <div id="grad-overlay"></div>
        <div class="nav-zone next" onclick="changePage(1)"></div>
    </div>

    <div id="menu-btn" onclick="toggleMenu(true)">
        <div class="burger-line"></div><div class="burger-line"></div><div class="burger-line"></div>
    </div>

    <div id="month-menu">
        <div class="month-item" onclick="goToMonth(1)">Январь</div>
        <div class="month-item" onclick="goToMonth(2)">Февраль</div>
        <div class="month-item" onclick="goToMonth(3)">Март</div>
        <div class="month-item" onclick="goToMonth(4)">Апрель</div>
        <div class="month-item" onclick="goToMonth(5)">Май</div>
        <div class="month-item" onclick="goToMonth(6)">Июнь</div>
        <div class="month-item" onclick="goToMonth(7)">Июль</div>
        <div class="month-item" onclick="goToMonth(8)">Август</div>
        <div class="month-item" onclick="goToMonth(9)">Сентябрь</div>
        <div class="month-item" onclick="goToMonth(10)">Октябрь</div>
        <div class="month-item" onclick="goToMonth(11)">Ноябрь</div>
        <div class="month-item" onclick="goToMonth(12)">Декабрь</div>
    </div>

    <script>
        let currentPage = 1;
        const totalFiles = 378;
        const OFFSET = 4;
        const img = document.getElementById('main-img');
        const grad = document.getElementById('grad-overlay');
        const menuBtn = document.getElementById('menu-btn');
        const themeMeta = document.getElementById('theme-meta');
        
        const splashPages = [1, 2, 34, 63, 95, 126, 158, 189, 221, 253, 284, 316, 347];

        function format(n) { return n.toString().padStart(3, '0'); }

        function updateTheme(page) {
            const isSplash = splashPages.includes(page);
            const bgColor = isSplash ? "#000000" : "#fafaf8";
            const gradColor = isSplash ? "rgba(0,0,0,1)" : "rgba(250,250,248,1)";
            const transColor = isSplash ? "rgba(0,0,0,0)" : "rgba(250,250,248,0)";
            
            document.body.style.background = bgColor;
            themeMeta.setAttribute("content", bgColor);
            grad.style.background = `linear-gradient(to bottom, ${transColor} 0%, ${gradColor} 100%)`;
            
            const lines = document.querySelectorAll('.burger-line');
            lines.forEach(l => l.style.background = isSplash ? "rgba(255,255,255,0.6)" : "rgba(0,0,0,0.4)");
        }

        function loadImg(pageNumber, isInstant = false) {
            const num = format(pageNumber);
            const temp = new Image();
            
            updateTheme(pageNumber);

            temp.onload = () => {
                img.src = temp.src;
                img.style.opacity = 1;
                window.scrollTo(0, 0);
            };

            temp.onerror = () => { if (!temp.src.includes('.jpg')) temp.src = `pages/${num}.jpg`; };

            if (!isInstant) img.style.opacity = 0; 
            temp.src = `pages/${num}.JPG`;

            if (pageNumber !== 1) {
                localStorage.setItem('lastLinePage', pageNumber);
                localStorage.setItem('lastUpdateDate', new Date().getDate());
            }
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            loadImg(currentPage, true);
        }

        function toggleMenu(s) { document.getElementById('month-menu').style.display = s ? 'flex' : 'none'; }
        
        function goToMonth(m) { 
            const monthPages = { 1:2, 2:34, 3:63, 4:95, 5:126, 6:158, 7:189, 8:221, 9:253, 10:284, 11:316, 12:347 };
            currentPage = monthPages[m]; loadImg(currentPage); toggleMenu(false); 
        }

        function startApp() {
            currentPage = 1;
            loadImg(1, true);
            
            // Ускорили время показа заставки (1.8с вместо 2.2с)
            setTimeout(() => {
                img.style.opacity = 0;
                setTimeout(() => {
                    const now = new Date();
                    const startYear = new Date(now.getFullYear(), 0, 0);
                    const dayOfYear = Math.floor((now - startYear) / 86400000);
                    const target = dayOfYear + OFFSET;
                    const savedDate = localStorage.getItem('lastUpdateDate');
                    const savedPage = localStorage.getItem('lastLinePage');

                    if (savedDate == now.getDate() && savedPage && savedPage != 1) {
                        currentPage = parseInt(savedPage);
                    } else {
                        currentPage = target;
                    }
                    loadImg(currentPage);
                    menuBtn.style.opacity = 1;
                }, 500); // Ускорили переход на дату (0.5с вместо 0.8с)
            }, 1800);
        }

        window.addEventListener('resize', () => window.scrollTo(0, 0));
        startApp();
    </script>
</body>
</html>

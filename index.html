<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ЛИНИЯ</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #1a1a1a; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        #calendar-container { 
            position: relative; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
        }
        img { 
            max-width: 100%; max-height: 100%; 
            object-fit: contain; display: block;
            transition: opacity 0.3s ease; /* Плавный переход между страницами */
        }
        .nav-zone { 
            position: absolute; top: 0; width: 45%; height: 100%; 
            z-index: 10; cursor: pointer; 
            -webkit-tap-highlight-color: transparent; /* Убирает синюю вспышку при нажатии на iPhone */
        }
        .prev { left: 0; }
        .next { right: 0; }
    </style>
</head>
<body>
    <div id="calendar-container">
        <div class="nav-zone prev" onclick="changePage(-1)"></div>
        <img id="display-image" src="" alt="Загрузка страницы...">
        <div class="nav-zone next" onclick="changePage(1)"></div>
    </div>

    <script>
        let currentPage;
        const totalFiles = 378;
        
        // --- ТВОЯ НАСТРОЙКА ---
        // Мы прибавляем 6, чтобы попасть ровно в 22 марта
        const OFFSET = 6; 
        // ----------------------

        function formatNumber(num) {
            return num.toString().padStart(3, '0');
        }

        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        function updateImage() {
            const imgElement = document.getElementById('display-image');
            const fileName = formatNumber(currentPage);
            
            // Плавное исчезновение перед сменой
            imgElement.style.opacity = 0.8;
            
            imgElement.src = `pages/${fileName}.JPG`;

            imgElement.onload = function() {
                imgElement.style.opacity = 1;
            };

            imgElement.onerror = function() {
                if (this.src.includes('.JPG')) {
                    this.src = `pages/${fileName}.jpg`;
                } else {
                    this.alt = "Страница " + fileName + " не найдена";
                }
            };
            
            localStorage.setItem('lastLinePage', currentPage);
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            updateImage();
        }

        // Логика старта
        const saved = localStorage.getItem('lastLinePage');
        // Если зашли первый раз — считаем день года + смещение
        // Если уже заходили — открываем на чем остановились
        currentPage = saved ? parseInt(saved) : (getDayOfYear() + OFFSET);
        
        updateImage();
    </script>
</body>
</html>

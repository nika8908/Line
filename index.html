<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>ЛИНИЯ</title>
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

/* Фон */
#bg {
    position: fixed;

    top: 0;
    left: 0;
    right: 0;
    bottom: -10px; /* ключ — перекрываем нижнюю щель */

    width: 100%;
    height: 100%;

    object-fit: cover;
    object-position: center top;

    z-index: 0;

    transform: scale(1.01); /* убирает микрополосы iOS */
}

/* клики */
#click-container {
    position: fixed;
    inset: 0;
    display: flex;
    z-index: 10;
}

.nav-zone {
    width: 50%;
    height: 100%;
}

/* меню */
#menu-btn {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 18px);
    right: 25px;

    z-index: 1000;
    width: 26px;
    height: 18px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    opacity: 0;
    transition: opacity 0.5s ease;
}

.burger-line {
    width: 100%;
    height: 1.5px;
    background: #fff;
}

#month-menu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.98);

    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    z-index: 2000;
}

.month-item {
    padding: 15px;
    font-size: 22px;
    color: #fff;
}

.close-menu {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 10px);
    right: 25px;
    font-size: 40px;
    color: #fff;
}
</style>
</head>

<body>

<img id="bg">

<div id="menu-btn" onclick="toggleMenu(true)">
    <div class="burger-line"></div>
    <div class="burger-line"></div>
    <div class="burger-line"></div>
</div>

<div id="month-menu">
    <div class="close-menu" onclick="toggleMenu(false)">×</div>
    <div class="month-item" onclick="goToMonth(1)">Январь</div>
    <div class="month-item" onclick="goToMonth(2)">Февраль</div>
    <div class="month-item" onclick="goToMonth(3)">Март</div>
    <div class="month-item" onclick="goToMonth(4)">Апрель</div>
    <div class="month-item" onclick="goToMonth(5)">Май</div>
    <div class="month-item" onclick="goToMonth(6)">Июнь</div>
    <div class="month-item" onclick="goToMonth(7)">Июль</div>
    <div class="month-item" onclick="goToMonth(8)">Август</div>
    <div class="month-item" onclick="goToMonth(9)">Сентябрь</div>
    <div class="month-item" onclick="goToMonth(10)">Октябрь</div>
    <div class="month-item" onclick="goToMonth(11)">Ноябрь</div>
    <div class="month-item" onclick="goToMonth(12)">Декабрь</div>
</div>

<div id="click-container">
    <div class="nav-zone" onclick="changePage(-1)"></div>
    <div class="nav-zone" onclick="changePage(1)"></div>
</div>

<script>
let currentPage;
const totalFiles = 378;
const OFFSET = 4;

const bg = document.getElementById('bg');

function formatNumber(num) {
    return num.toString().padStart(3, '0');
}

function updateImage() {
    const fileName = formatNumber(currentPage);
    const img1 = `pages/${fileName}.JPG`;
    const img2 = `pages/${fileName}.jpg`;

    const test = new Image();

    test.onload = () => bg.src = img1;
    test.onerror = () => bg.src = img2;

    test.src = img1;

    localStorage.setItem('lastLinePage', currentPage);
    localStorage.setItem('lastUpdateDate', new Date().getDate());
}

function changePage(step) {
    currentPage += step;

    if (currentPage < 1) currentPage = totalFiles;
    if (currentPage > totalFiles) currentPage = 1;

    updateImage();
}

function runSplash() {
    currentPage = 1;
    updateImage();

    setTimeout(() => {
        const savedDate = localStorage.getItem('lastUpdateDate');
        const todayDate = new Date().getDate();

        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const targetPage = Math.floor((now - start) / 86400000) + OFFSET;

        const savedPage = localStorage.getItem('lastLinePage');

        if (savedDate != todayDate) {
            currentPage = targetPage;
        } else {
            currentPage = savedPage ? parseInt(savedPage) : targetPage;
        }

        updateImage();
        document.getElementById('menu-btn').style.opacity = 1;

    }, 2200);
}

function toggleMenu(show) {
    document.getElementById('month-menu').style.display = show ? 'flex' : 'none';
}

function goToMonth(m) {
    const monthPages = {
        1:2, 2:34, 3:63, 4:95, 5:126, 6:158,
        7:189, 8:221, 9:253, 10:284, 11:316, 12:347
    };

    currentPage = monthPages[m];
    updateImage();
    toggleMenu(false);
}

runSplash();
</script>

</body>
</html>

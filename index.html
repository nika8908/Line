<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Линия</title>
    <style>
        /* Убираем все лишнее, чтобы картинка была на весь экран */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #fafaf8; /* Твой фирменный цвет */
            display: flex; justify-content: center; align-items: center;
        }

        #calendar-img {
            max-width: 100%; max-height: 100%;
            width: auto; height: auto;
            object-fit: contain;
            transition: opacity 0.3s ease; /* Плавный переход */
        }

        .container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="container" onclick="nextPage()">
    <img id="calendar-img" src="" alt="Страница календаря">
</div>

<script>
    // --- НАСТРОЙКИ (Проверь эти цифры!) ---
    
    // Сколько всего картинок перед 1 января? 
    // Если у тебя 1 Главная обложка + 1 Заставка Января, то здесь "2".
    const TOTAL_COVERS_BEFORE_JAN = 2; 

    // --- ЛОГИКА ОПРЕДЕЛЕНИЯ ДАТЫ ---

    function getAutoIndex() {
        const now = new Date();
        const dayOfMonth = now.getDate(); // Какое сегодня число (1, 2, 3...)
        const month = now.getMonth();     // Текущий месяц (0-11)
        
        // Считаем день года (1-366)
        const start = new Date(now.getFullYear(), 0, 0);
        const diff = now - start;
        const oneDay = 1000 * 60 * 60 * 24;
        const dayOfYear = Math.floor(diff / oneDay);

        // Смещение: Базовые обложки + количество прошедших заставок месяцев
        // (В январе passedMonths = 0, в апреле = 3)
        let offset = TOTAL_COVERS_BEFORE_JAN + month;

        if (dayOfMonth === 1) {
            // Если сегодня 1-е число — открываем ЗАСТАВКУ МЕСЯЦА
            return dayOfYear + (offset - 1); 
        } else {
            // Если сегодня 2-е число и далее — прыгаем через заставку на саму дату
            return dayOfYear + offset;
        }
    }

    // --- УПРАВЛЕНИЕ СТРАНИЦАМИ ---

    let currentIndex;
    const saved = localStorage.getItem('savedLinePage');

    if (saved) {
        currentIndex = parseInt(saved);
    } else {
        currentIndex = getAutoIndex();
    }

    function updateImage() {
        // Форматируем число в вид 001, 095 и т.д.
        const fileName = String(currentIndex).padStart(3, '0') + '.jpg';
        const img = document.getElementById('calendar-img');
        
        img.style.opacity = '0.2'; // Эффект подгрузки
        img.src = 'img/' + fileName;
        
        img.onload = () => { img.style.opacity = '1'; };
        
        // Сохраняем прогресс
        localStorage.setItem('savedLinePage', currentIndex);
    }

    function nextPage() {
        currentIndex++;
        // Если дошли до конца (378 страниц), возвращаемся в начало или на обложку
        if (currentIndex > 378) currentIndex = 1; 
        updateImage();
    }

    // Запуск при открытии
    updateImage();

</script>
</body>
</html>

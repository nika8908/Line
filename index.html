<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ЛИНИЯ</title>
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
            position: fixed;
            inset: 0;
            background: #000;
        }

        body {
            touch-action: none;
        }

        /* Фон на весь экран */
        #bg {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            min-height: -webkit-fill-available;
            object-fit: cover;
            object-position: center top;
            display: block;
            z-index: 0;
            user-select: none;
            -webkit-user-drag: none;
            opacity: 1;
            transition: opacity 0.25s ease-in-out;
        }

        body.dark-bg {
            background: #000 !important;
        }

        #click-container {
            position: fixed;
            inset: 0;
            display: flex;
            z-index: 10;
        }

        .nav-zone {
            width: 50%;
            height: 100%;
            cursor: pointer;
        }

        #menu-btn {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 18px);
            right: 25px;
            z-index: 1000;
            width: 26px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            filter: drop-shadow(0px 1px 2px rgba(0, 0, 0, 0.5));
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .burger-line {
            width: 100%;
            height: 1.5px;
            background: #fff;
            border-radius: 1px;
        }

        #month-menu {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 2000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .month-item {
            padding: 15px;
            font-size: 22px;
            color: #fff;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

        .close-menu {
            position: absolute;
            top: calc(env(safe-area-inset-top, 0px) + 10px);
            right: 25px;
            font-size: 40px;
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <img id="bg" alt="calendar page">

    <div id="menu-btn" onclick="toggleMenu(true)">
        <div class="burger-line"></div>
        <div class="burger-line"></div>
        <div class="burger-line"></div>
    </div>

    <div id="month-menu">
        <div class="close-menu" onclick="toggleMenu(false)">×</div>
        <div class="month-item" onclick="goToMonth(1)">Январь</div>
        <div class="month-item" onclick="goToMonth(2)">Февраль</div>
        <div class="month-item" onclick="goToMonth(3)">Март</div>
        <div class="month-item" onclick="goToMonth(4)">Апрель</div>
        <div class="month-item" onclick="goToMonth(5)">Май</div>
        <div class="month-item" onclick="goToMonth(6)">Июнь</div>
        <div class="month-item" onclick="goToMonth(7)">Июль</div>
        <div class="month-item" onclick="goToMonth(8)">Август</div>
        <div class="month-item" onclick="goToMonth(9)">Сентябрь</div>
        <div class="month-item" onclick="goToMonth(10)">Октябрь</div>
        <div class="month-item" onclick="goToMonth(11)">Ноябрь</div>
        <div class="month-item" onclick="goToMonth(12)">Декабрь</div>
    </div>

    <div id="click-container">
        <div class="nav-zone" onclick="changePage(-1)"></div>
        <div class="nav-zone" onclick="changePage(1)"></div>
    </div>

    <script>
        let currentPage;
        const totalFiles = 378;
        const OFFSET = 4;
        const splashPages = [1, 2, 34, 63, 95, 126, 158, 189, 221, 253, 284, 316, 347];

        const bg = document.getElementById('bg');

        function formatNumber(num) {
            return num.toString().padStart(3, '0');
        }

        function loadImage(src1, src2) {
            bg.style.opacity = '0';

            const trySrc = (src) => {
                const testImg = new Image();
                testImg.onload = () => {
                    bg.src = src;
                    requestAnimationFrame(() => {
                        bg.style.opacity = '1';
                    });
                };
                testImg.onerror = () => {
                    if (src === src1 && src2) {
                        trySrc(src2);
                    } else {
                        bg.style.opacity = '1';
                    }
                };
                testImg.src = src;
            };

            trySrc(src1);
        }

        function updateImage() {
            const fileName = formatNumber(currentPage);
            const upper = `pages/${fileName}.JPG`;
            const lower = `pages/${fileName}.jpg`;

            document.body.classList.toggle('dark-bg', splashPages.includes(currentPage));

            loadImage(upper, lower);

            localStorage.setItem('lastLinePage', currentPage);
            localStorage.setItem('lastUpdateDate', new Date().getDate());
        }

        function changePage(step) {
            currentPage += step;
            if (currentPage < 1) currentPage = totalFiles;
            if (currentPage > totalFiles) currentPage = 1;
            updateImage();
        }

        function runSplash() {
            currentPage = 1;
            updateImage();

            setTimeout(() => {
                const savedDate = localStorage.getItem('lastUpdateDate');
                const todayDate = new Date().getDate();
                const now = new Date();
                const start = new Date(now.getFullYear(), 0, 0);
                const targetPage = Math.floor((now - start) / 86400000) + OFFSET;
                const savedPage = localStorage.getItem('lastLinePage');

                if (savedDate != todayDate) {
                    currentPage = targetPage;
                } else {
                    currentPage = (savedPage && savedPage != 1) ? parseInt(savedPage) : targetPage;
                }

                updateImage();
                document.getElementById('menu-btn').style.opacity = 1;
            }, 2200);
        }

        function toggleMenu(show) {
            document.getElementById('month-menu').style.display = show ? 'flex' : 'none';
        }

        function goToMonth(m) {
            const monthPages = {
                1: 2, 2: 34, 3: 63, 4: 95, 5: 126, 6: 158,
                7: 189, 8: 221, 9: 253, 10: 284, 11: 316, 12: 347
            };
            currentPage = monthPages[m];
            updateImage();
            toggleMenu(false);
        }

        runSplash();
    </script>
</body>
</html>

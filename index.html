<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>ЛИНИЯ</title>
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    background: #000;
    overflow: hidden;
}

/* контейнер с реальной высотой */
#app {
    position: fixed;
    inset: 0;
    height: var(--vh);
    overflow: hidden;
}

/* фон */
#bg {
    position: absolute;
    inset: 0;

    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;

    /* страховка от щелей */
    transform: scale(1.015);
}

/* клики */
#click-container {
    position: absolute;
    inset: 0;
    display: flex;
}

.nav-zone {
    width: 50%;
}

/* меню */
#menu-btn {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 18px);
    right: 25px;
    z-index: 10;

    width: 26px;
    height: 18px;

    display: flex;
    flex-direction: column;
    justify-content: space-between;

    opacity: 0;
    transition: 0.5s;
}

.burger-line {
    height: 1.5px;
    background: #fff;
}
</style>
</head>

<body>

<div id="app">
    <div id="bg"></div>

    <div id="menu-btn" onclick="toggleMenu(true)">
        <div class="burger-line"></div>
        <div class="burger-line"></div>
        <div class="burger-line"></div>
    </div>

    <div id="click-container">
        <div class="nav-zone" onclick="changePage(-1)"></div>
        <div class="nav-zone" onclick="changePage(1)"></div>
    </div>
</div>

<script>
const bg = document.getElementById('bg');

function setVH() {
    const h = window.visualViewport
        ? window.visualViewport.height
        : window.innerHeight;

    document.documentElement.style.setProperty('--vh', h + 'px');
}

window.addEventListener('resize', setVH);
window.visualViewport && window.visualViewport.addEventListener('resize', setVH);

setVH();

/* дальше твоя логика без изменений */
let currentPage;
const totalFiles = 378;
const OFFSET = 4;

function formatNumber(num) {
    return num.toString().padStart(3, '0');
}

function updateImage() {
    const fileName = formatNumber(currentPage);

    const img1 = `pages/${fileName}.JPG`;
    const img2 = `pages/${fileName}.jpg`;

    const test = new Image();

    test.onload = () => bg.style.backgroundImage = `url('${img1}')`;
    test.onerror = () => bg.style.backgroundImage = `url('${img2}')`;

    test.src = img1;
}

function changePage(step) {
    currentPage += step;

    if (currentPage < 1) currentPage = totalFiles;
    if (currentPage > totalFiles) currentPage = 1;

    updateImage();
}

function runSplash() {
    currentPage = 1;
    updateImage();

    setTimeout(() => {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        currentPage = Math.floor((now - start) / 86400000) + OFFSET;

        updateImage();
        document.getElementById('menu-btn').style.opacity = 1;

    }, 2200);
}

function toggleMenu() {}

runSplash();
</script>

</body>
</html>

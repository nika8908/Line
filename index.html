<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Линия</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #fafaf8; display: flex; justify-content: center; align-items: center; }
        #calendar-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" onclick="nextPage()">
    <img id="calendar-img" src="" alt="Загрузка...">
</div>

<script>
    // --- ТВОИ НАСТРОЙКИ ---
    const TOTAL_IMAGES = 378; // Всего файлов
    const START_OFFSET = 2;   // 1 главная обложка + 1 заставка января

    function getIndexByDate() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const dayOfYear = Math.floor((now - start) / 86400000);
        const month = now.getMonth();
        const isFirstDay = now.getDate() === 1;

        // Формула: день года + сколько заставок месяцев уже пройдено
        let index = dayOfYear + month + START_OFFSET;

        // Если сегодня 1-е число — показываем заставку месяца (она на 1 раньше дня)
        if (isFirstDay) {
            index = index - 1;
        }
        return index;
    }

    // 1. Пытаемся взять сохраненную страницу
    let saved = localStorage.getItem('savedLinePage');
    let currentIndex;

    if (saved) {
        currentIndex = parseInt(saved);
    } else {
        currentIndex = getIndexByDate();
    }

    function updateImage() {
        // Форматируем в 001, 002...
        const fileName = String(currentIndex).padStart(3, '0') + '.jpg';
        const img = document.getElementById('calendar-img');
        
        // ВАЖНО: Проверь, лежит ли index.html рядом с папкой img
        img.src = 'img/' + fileName;
        
        localStorage.setItem('savedLinePage', currentIndex);
        
        // Для проверки в консоли (F12)
        console.log("Текущий файл:", fileName);
    }

    function nextPage() {
        currentIndex++;
        if (currentIndex > TOTAL_IMAGES) currentIndex = 1;
        updateImage();
    }

    updateImage();
</script>
</body>
</html>
